name: CMake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  macos:
    name: ${{ matrix.preset }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        preset: [debug, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  windows:
    name: ${{ matrix.preset }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        preset: [windows-debug, windows-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
